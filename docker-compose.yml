services:
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: laravel_queue_project
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  soketi:
    image: quay.io/soketi/soketi:latest
    depends_on:
      - redis
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: "local"
      SOKETI_DEFAULT_APP_KEY: "local"
      SOKETI_DEFAULT_APP_SECRET: "local"
      SOKETI_REDIS_HOST: "redis"
      SOKETI_REDIS_PORT: "6379"
    ports:
      - "6001:6001"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - docker/.env.backend
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/.env.backend:/var/www/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      soketi:
        condition: service_started
    ports:
      - "8000:8000"
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - docker/.env.backend
    environment:
      SKIP_DB_BOOTSTRAP: "true"
      SKIP_COMPOSER_INSTALL: "true"
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/.env.backend:/var/www/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=0"]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    env_file:
      - docker/.env.frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: ["pnpm", "dev", "--host", "0.0.0.0", "--port", "3000"]
    restart: unless-stopped

volumes:
  mysql_data:
  vendor_data:
  frontend_node_modules:
